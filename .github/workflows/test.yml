name: Run tests
on:
  pull_request:

  push:
    branches: [main]
    paths:
      - android/**
      - package.json
      - src/**
      - tests/**
      - .github/workflows/test.yml

  workflow_call:

  workflow_dispatch:

jobs:
  run-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: |
          npm ci
      - name: Run Prettier check
        run: |
          npm run prettier:check
      - name: Run Lint check
        run: |
          npm run lint
      - name: Run Jest tests
        run: |
          npm run test
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21.0.2'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Prebuild
        run: |
          mv android/ android_temp/
          npx expo prebuild --platform android
          \cp -frT android_temp/ android/
      - name: Diagnose Android unit test environment
        run: |
          java -version
          node -v
          npm -v
          echo "--- android/app/build.gradle test configuration ---"
          sed -n '120,210p' android/app/build.gradle
          echo "--- android/app/src/test contents ---"
          find android/app/src/test -type f | sort
          cd android
          echo "--- gradle version ---"
          ./gradlew --version
          echo "--- debugUnitTestCompileClasspath ---"
          ./gradlew :app:dependencies --configuration debugUnitTestCompileClasspath --no-daemon
      - name: Run Android unit tests
        run: |
          npm run test:android
