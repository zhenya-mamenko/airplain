name: Build APK and Create GitHub Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release'
        required: false
        type: boolean
        default: false

jobs:
  tests:
    uses: ./.github/workflows/test.yml

  build:
    name: Install and build
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'microsoft'
          java-version: '21.0.2'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          cmdline-tools-version: 14742923
          packages: tools platform-tools platforms;android-36 build-tools;36.0.0 ndk;27.1.12297006
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prebuild
        run: |
          mv android/ android_temp/
          npx expo prebuild --platform android
          \cp -frT android_temp/ android/
          sed -i 's/signingConfig signingConfigs.debug/signingConfig null/g' android/app/build.gradle
      - name: Generate Android resources
        run: |
          npm run generate:android-resources
      - name: Build APK
        run: |
          cd android
          ./gradlew app:assembleRelease --no-daemon
      - name: Sign APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.create_release }}
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > release.keystore
          $ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner sign \
            --ks release.keystore \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out airplain.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
      - name: Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.create_release }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: airplain.apk
          token: ${{ secrets.RELEASE_TOKEN }}
          body_path: ${{ github.workspace }}/release-notes.txt
          draft: false
          prerelease: false
          make_latest: true
